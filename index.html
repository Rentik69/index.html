<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACCORD OS // OPTIMIZED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Unbounded:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --cyan: #00e5ff; --bg: #05070a; --panel: #0e1117; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; display: flex; 
        }

        /* SIDEBAR (GEMINI STYLE) */
        #sidebar { 
            width: 320px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 100;
        }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            scroll-behavior: smooth; 
        }

        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .msg.user { background: #1f242d; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.ai { background: rgba(0, 229, 255, 0.08); border: 1px solid rgba(0, 229, 255, 0.2); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* VIEWPORT */
        #viewport { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; padding: 20px;
        }

        #core-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        
        #core { 
            width: 100px; height: 100px; background: var(--cyan); border-radius: 50%; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0,229,255,0.3); z-index: 10;
        }
        
        #core.active { box-shadow: 0 0 60px var(--cyan); transform: scale(1.1); }
        #core.talking { animation: blob 1.5s infinite alternate; }

        @keyframes blob {
            0% { border-radius: 50% 50% 50% 50%; transform: scale(1.1) rotate(0deg); }
            100% { border-radius: 40% 60% 45% 55%; transform: scale(1.2) rotate(5deg); }
        }

        /* CONTROLS */
        #bottom-bar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; display: flex; gap: 10px; align-items: center;
        }

        #input-field { 
            flex: 1; background: #161b22; border: 1px solid var(--border); border-radius: 30px; 
            padding: 14px 24px; color: #fff; outline: none; font-size: 16px;
        }

        .btn-send { 
            background: var(--cyan); border: none; width: 50px; height: 50px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        #debug { position: absolute; top: 20px; font-family: monospace; font-size: 11px; color: var(--cyan); opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 25px; border-bottom: 1px solid var(--border); font-family: 'Unbounded'; font-size: 14px;">ACCORD // LOG</div>
    <div id="messages"></div>
</div>

<div id="viewport">
    <div id="debug">System: Standby</div>
    <div id="core-container">
        <div id="core" onclick="handleCoreClick()"></div>
    </div>
    <p id="hint" style="margin-top: 30px; font-size: 12px; color: #555;">TAP CORE TO START LIVE CONVERSATION</p>
    
    <div id="bottom-bar">
        <input type="text" id="input-field" placeholder="Type or use Live Mode..." onkeypress="if(event.key==='Enter') sendText()">
        <button class="btn-send" onclick="sendText()">🚀</button>
    </div>
</div>

<script>
let apiKey = localStorage.getItem('akkord_key_pro') || prompt("Enter Groq API Key:");
if (apiKey) localStorage.setItem('akkord_key_pro', apiKey);

let history = [];
let isLive = false;
let isSpeaking = false;
let recognition;
let silenceTimer;

// Инициализация Speech Recognition
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.interimResults = true;
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript.trim();
        updateDebug("Listening: " + text);
        
        // Визуальная реакция
        const scale = 1.1 + (Math.random() * 0.1);
        document.getElementById('core').style.transform = `scale(${scale})`;

        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (isLive && !isSpeaking && text.length > 1) {
                processVoiceAction(text);
            }
        }, 1200); // Оптимальная пауза для VAD
    };

    recognition.onend = () => {
        if (isLive && !isSpeaking) recognition.start();
    };
}

function handleCoreClick() {
    // Активация AudioContext для браузеров
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    
    if (!isLive) {
        startLive();
    } else {
        stopLive();
    }
}

function startLive() {
    isLive = true;
    document.getElementById('core').classList.add('active');
    document.getElementById('hint').textContent = "LIVE MODE ACTIVE";
    updateDebug("Microphone ON");
    recognition.start();
}

function stopLive() {
    isLive = false;
    isSpeaking = false;
    recognition.stop();
    window.speechSynthesis.cancel();
    document.getElementById('core').className = '';
    document.getElementById('hint').textContent = "TAP CORE TO START LIVE CONVERSATION";
    updateDebug("System Standby");
}

async function processVoiceAction(text) {
    recognition.stop(); // Останавливаем, чтобы не слушал сам себя
    addMessage('user', text);
    
    updateDebug("Thinking...");
    const aiResponse = await fetchGroq(text);
    
    if (aiResponse) {
        addMessage('ai', aiResponse);
        speak(aiResponse);
    }
}

async function sendText() {
    const input = document.getElementById('input-field');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage('user', text);
    updateDebug("Thinking...");
    
    const aiResponse = await fetchGroq(text);
    if (aiResponse) addMessage('ai', aiResponse);
}

async function fetchGroq(text) {
    try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [{role: "system", content: "Ты Аккорд, лаконичный помощник Романа."}, ...history, {role: "user", content: text}],
                max_tokens: 500
            })
        });
        const data = await response.json();
        updateDebug("Ready");
        return data.choices[0].message.content;
    } catch (e) {
        updateDebug("API Error");
        return null;
    }
}

function speak(text) {
    isSpeaking = true;
    window.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ru-RU';
    utterance.rate = 1.0;
    
    utterance.onstart = () => {
        document.getElementById('core').classList.add('talking');
        updateDebug("Speaking...");
    };

    utterance.onend = () => {
        isSpeaking = false;
        document.getElementById('core').classList.remove('talking');
        if (isLive) {
            updateDebug("Listening...");
            recognition.start();
        }
    };

    window.speechSynthesis.speak(utterance);
}

function addMessage(role, content) {
    history.push({role, content});
    if (history.length > 12) history.shift(); // Оптимизация памяти

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = marked.parse(content);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function updateDebug(txt) {
    document.getElementById('debug').textContent = "Status: " + txt;
}
</script>
</body>
</html>
