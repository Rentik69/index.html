<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACCORD // HYBRID OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Unbounded:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --cyan: #00e5ff; --bg: #080a0f; --panel: #11141b; --text: #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ОСНОВНОЙ КОНТЕЙНЕР (GEMINI STYLE) */
#main-layout {
  flex: 1; display: flex; position: relative; overflow: hidden;
}

/* ЛЕВАЯ ПАНЕЛЬ: ЧАТ */
#chat-sidebar {
  width: 350px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column; z-index: 5;
}
@media (max-width: 800px) { #chat-sidebar { position: absolute; left: -100%; width: 100%; height: 100%; transition: 0.3s; } #chat-sidebar.open { left: 0; } }

#messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
  scrollbar-width: thin; scrollbar-color: var(--cyan) transparent;
}
.msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 90%; }
.msg.user { background: rgba(255,255,255,0.05); align-self: flex-end; }
.msg.ai { background: rgba(0,229,255,0.05); border-left: 2px solid var(--cyan); align-self: flex-start; }

/* ЦЕНТРАЛЬНАЯ ПАНЕЛЬ: LIVE CORE */
#core-viewport {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; background: radial-gradient(circle at center, #121826 0%, #080a0f 100%);
}

.core-container {
  width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; position: relative;
}

#visualizer {
  width: 100px; height: 100px; background: var(--cyan); border-radius: 50%;
  box-shadow: 0 0 30px rgba(0,229,255,0.4); transition: 0.15s ease; cursor: pointer; z-index: 10;
}
#visualizer.listening { box-shadow: 0 0 60px var(--cyan); }

/* НИЖНЯЯ ПАНЕЛЬ ВВОДА */
#input-bar {
  padding: 15px 25px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 15px; z-index: 20;
}

#text-input {
  flex: 1; background: #1c212c; border: none; border-radius: 25px; padding: 12px 20px;
  color: #fff; font-size: 15px; outline: none;
}

.icon-btn {
  background: none; border: none; color: var(--cyan); cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.icon-btn:hover { transform: scale(1.1); }
.active-mode { color: #fff; background: var(--cyan); border-radius: 50%; width: 35px; height: 35px; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
.card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--cyan); }
.card input { width: 100%; padding: 10px; margin: 15px 0; background: #000; border: 1px solid var(--cyan); color: #fff; }
</style>
</head>
<body>

<div class="overlay" id="key-modal">
  <div class="card">
    <h2 style="font-family:'Unbounded'; font-size:16px;">AUTHENTICATION</h2>
    <input type="password" id="key-input" placeholder="GROQ_API_KEY">
    <button class="icon-btn active-mode" style="width:100%; border-radius:10px;" onclick="saveKey()">CONNECT</button>
  </div>
</div>

<div id="main-layout">
  <!-- ЧАТ (GEMINI SIDEBAR) -->
  <aside id="chat-sidebar">
    <div style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); font-weight:bold; font-size:12px; display:flex; justify-content:space-between;">
      <span>HISTORY_LOG</span>
      <span onclick="toggleSidebar()" style="cursor:pointer; color:var(--cyan)">✕</span>
    </div>
    <div id="messages"></div>
  </aside>

  <!-- LIVE CORE -->
  <main id="core-viewport">
    <div id="status-label" style="position:absolute; top:20px; font-size:10px; letter-spacing:2px; opacity:0.5;">MODE: STANDBY</div>
    <div class="core-container">
      <div id="visualizer" onclick="startLiveMode()"></div>
    </div>
    <div id="live-hint" style="margin-top:20px; font-size:12px; color:var(--cyan); opacity:0.7;">TAP CORE FOR LIVE MODE</div>
  </main>
</div>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<footer id="input-bar">
  <button class="icon-btn" onclick="toggleSidebar()" id="menu-btn">📜</button>
  <input type="text" id="text-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendText()">
  <button class="icon-btn" onclick="sendText()">🚀</button>
</footer>

<script>
let apiKey = localStorage.getItem('akkord_key_pro') || '';
let history = JSON.parse(localStorage.getItem('akkord_history')) || [];
let busy = false;
let isLive = false;
let silenceTimer;

if (apiKey) document.getElementById('key-modal').style.display = 'none';
window.onload = () => history.forEach(m => renderMsg(m.role, m.content));

function saveKey() {
  const v = document.getElementById('key-input').value.trim();
  if(v.startsWith('gsk_')) { apiKey = v; localStorage.setItem('akkord_key_pro', v); location.reload(); }
}

function toggleSidebar() { document.getElementById('chat-sidebar').classList.toggle('open'); }

// --- ТЕКСТОВЫЙ РЕЖИМ (Без звука) ---
async function sendText() {
  const inp = document.getElementById('text-input');
  const txt = inp.value.trim();
  if(!txt || busy) return;
  
  inp.value = '';
  addMsg('user', txt);
  busy = true;
  document.getElementById('status-label').textContent = 'MODE: TEXT_PROCESSING';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [{role:'system', content:'Ты Аккорд. Отвечай только текстом.'}, ...history]
      })
    });
    const data = await res.json();
    addMsg('ai', data.choices[0].message.content);
  } catch(e) { renderMsg('ai', 'Error connecting to neural network.'); }
  finally { busy = false; document.getElementById('status-label').textContent = 'MODE: STANDBY'; }
}

// --- LIVE MODE (Голосовой с VAD) ---
let recognition;
function startLiveMode() {
  if (isLive) { stopLive(); return; }
  
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return;
  
  recognition = new Speech();
  recognition.lang = 'ru-RU';
  recognition.interimResults = true;
  isLive = true;
  
  document.getElementById('visualizer').classList.add('listening');
  document.getElementById('status-label').textContent = 'MODE: LIVE_LISTENING';
  
  recognition.onresult = (e) => {
    clearTimeout(silenceTimer);
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('text-input').value = transcript;
    
    // Эффект овала
    let v = Math.random() * 30 + 5;
    document.getElementById('visualizer').style.transform = `scale(${1 + v/100})`;

    // VAD: Если человек замолчал на 1.5 сек
    silenceTimer = setTimeout(() => {
        if (transcript.length > 2) {
            recognition.stop();
            sendLive(transcript);
        }
    }, 1500);
  };

  recognition.onend = () => { if(isLive) recognition.start(); };
  recognition.start();
}

function stopLive() {
  isLive = false;
  if(recognition) recognition.stop();
  document.getElementById('visualizer').classList.remove('listening');
  document.getElementById('visualizer').style.transform = 'scale(1)';
  document.getElementById('status-label').textContent = 'MODE: STANDBY';
}

async function sendLive(txt) {
  stopLive();
  addMsg('user', txt);
  document.getElementById('text-input').value = '';
  document.getElementById('status-label').textContent = 'MODE: LIVE_RESPONSE';
  
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [{role:'system', content:'Ты Аккорд. Отвечай кратко для голоса.'}, ...history]
      })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMsg('ai', reply);
    speak(reply);
  } catch(e) {}
}

// --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
function addMsg(role, content) {
  history.push({role, content});
  if(history.length > 15) history.shift();
  localStorage.setItem('akkord_history', JSON.stringify(history));
  renderMsg(role, content);
}

function renderMsg(role, content) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = role === 'ai' ? marked.parse(content) : content;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function speak(text) {
  window.speechSynthesis.cancel();
  const ut = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, '').substring(0, 400));
  ut.lang = 'ru-RU';
  ut.onstart = () => {
    document.getElementById('visualizer').classList.add('listening');
    let i = setInterval(() => {
        if(!window.speechSynthesis.speaking) { clearInterval(i); document.getElementById('visualizer').style.transform='scale(1)'; return; }
        document.getElementById('visualizer').style.transform=`scale(${1.1 + Math.random()*0.2})`;
    }, 100);
  };
  ut.onend = () => {
    document.getElementById('visualizer').classList.remove('listening');
    startLiveMode(); // Снова включаем микрофон после ответа
  };
  window.speechSynthesis.speak(ut);
}
</script>
</body>
</html>
