<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Аккорд Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --c1: #7b2fff; --c2: #00e5ff; --c3: #2fff7b;
  --bg: #08080f; --s1: #12121f; --s2: #1c1c30;
  --border: rgba(255,255,255,0.08);
  --text: #ffffff; --muted: #9090b0; --speed: 6s;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
.blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.b1 { width: 300px; height: 300px; opacity: 0.13; top: -80px; right: -60px; background: radial-gradient(circle, var(--c1), transparent); animation: f1 var(--speed) ease-in-out infinite alternate; }
.b2 { width: 250px; height: 250px; opacity: 0.10; bottom: 100px; left: -60px; background: radial-gradient(circle, var(--c2), transparent); animation: f2 calc(var(--speed)*1.3) ease-in-out infinite alternate; }
@keyframes f1 { 0%{transform:translate(0,0)} 100%{transform:translate(30px,40px)} }
@keyframes f2 { 0%{transform:translate(0,0)} 100%{transform:translate(40px,-30px)} }
#app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 1; }
header { padding: 18px 16px; border-bottom: 1px solid var(--border); background: rgba(8,8,15,0.8); backdrop-filter: blur(20px); display: flex; align-items: center; gap: 10px; }
.avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--c1), var(--c2)); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.hinfo { flex: 1; }
.hinfo h1 { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 900; }
#mood-label { font-size: 10px; color: var(--muted); }
.hbtn { min-width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; }
#messages { flex: 1; overflow-y: auto; padding: 20px 14px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 90%; display: flex; flex-direction: column; gap: 4px; animation: fu 0.3s ease; }
@keyframes fu { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
.msg.user { align-self: flex-end; }
.msg.ai { align-self: flex-start; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
.msg.user .bubble { background: linear-gradient(135deg, var(--c1), var(--c2)); border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: var(--s1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble pre { background: #000; padding: 10px; border-radius: 8px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
.bubble code { font-family: monospace; color: var(--c2); }
#input-area { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#txt { flex: 1; background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: #fff; resize: none; max-height: 120px; outline: none; }
.btn { width: 50px; height: 50px; border-radius: 14px; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
#mic { background: var(--s2); color: var(--muted); }
#mic.on { background: #ff3366; color: #fff; animation: pulse 1s infinite; }
#send { background: var(--c1); color: #fff; }
@keyframes pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }
.overlay { position: fixed; inset: 0; background: #08080f; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: var(--s1); padding: 30px; border-radius: 20px; width: 100%; max-width: 340px; text-align: center; }
.card input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; margin: 15px 0; outline: none; }
.card button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--c1); color: #fff; font-weight: 700; cursor: pointer; }
#status { font-size: 11px; text-align: center; color: var(--muted); margin-top: 10px; }
#voice-bar { display: none; text-align: center; padding: 5px; font-size: 12px; color: var(--c2); }
#voice-bar.on { display: block; }
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>

<div class="overlay" id="key-modal">
  <div class="card">
    <h2>АККОРД PRO</h2>
    <p style="font-size: 13px; color: #9090b0; margin-top: 10px;">Введи свой API ключ Groq</p>
    <input type="password" id="key-input" placeholder="gsk_...">
    <button onclick="saveKey()">НАЧАТЬ РАБОТУ</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="avatar">🤖</div>
    <div class="hinfo"><h1>АККОРД</h1><div id="mood-label">Система готова</div></div>
    <button class="hbtn" onclick="toggleVoice()" id="v-btn">🔊</button>
    <button class="hbtn" onclick="forgetKey()">🔑</button>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <div id="voice-bar">● Слушаю тебя...</div>
    <div class="input-row">
      <button class="btn" id="mic" onclick="toggleMic()">🎙️</button>
      <textarea id="txt" placeholder="Напиши что-нибудь..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="btn" id="send" onclick="send()">↑</button>
    </div>
    <div id="status"></div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('akkord_key_pro') || '';
let history = [];
let voiceOn = true;
let busy = false;
let recognition = null;

if (apiKey) document.getElementById('key-modal').style.display = 'none';

function saveKey() {
  const val = document.getElementById('key-input').value.trim();
  if (val.startsWith('gsk_')) {
    apiKey = val;
    localStorage.setItem('akkord_key_pro', val);
    document.getElementById('key-modal').style.display = 'none';
  } else {
    alert('Неверный формат ключа!');
  }
}

function forgetKey() {
  localStorage.removeItem('akkord_key_pro');
  location.reload();
}

// УЛУЧШЕННЫЙ ГОЛОС
function initSpeech() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return null;
  const rec = new Speech();
  rec.lang = 'ru-RU';
  rec.interimResults = true;
  rec.onstart = () => {
    document.getElementById('mic').classList.add('on');
    document.getElementById('voice-bar').classList.add('on');
  };
  rec.onresult = (e) => {
    const text = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('txt').value = text;
  };
  rec.onend = () => {
    document.getElementById('mic').classList.remove('on');
    document.getElementById('voice-bar').classList.remove('on');
    if (document.getElementById('txt').value.length > 2) send();
  };
  rec.onerror = () => {
    document.getElementById('mic').classList.remove('on');
    document.getElementById('voice-bar').classList.remove('on');
  };
  return rec;
}

function toggleMic() {
  if (!recognition) recognition = initSpeech();
  try { recognition.start(); } catch(e) { recognition.stop(); }
}

async function send() {
  const inp = document.getElementById('txt');
  const text = inp.value.trim();
  if (!text || busy || !apiKey) return;

  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text);
  history.push({role:'user', content:text});
  if (history.length > 8) history = history.shift();

  busy = true;
  document.getElementById('status').textContent = 'Аккорд думает...';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [{role:'system', content:'Ты - Аккорд, краткий и эффективный помощник.'}, ...history]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.choices[0].message.content;
    addMsg('ai', reply);
    history.push({role:'assistant', content:reply});
    if (voiceOn) speak(reply);
  } catch (e) {
    addMsg('ai', '❌ Ошибка: ' + e.message);
  } finally {
    busy = false;
    document.getElementById('status').textContent = '';
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const content = role === 'ai' ? marked.parse(text) : text;
  div.innerHTML = `<div class="bubble">${content}</div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const ut = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, '').substring(0, 250));
  ut.lang = 'ru-RU';
  window.speechSynthesis.speak(ut);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  document.getElementById('v-btn').textContent = voiceOn ? '🔊' : '🔇';
}
</script>
</body>
</html>
