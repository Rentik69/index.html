<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аккорд</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root { --c1: #7b2fff; --c2: #00e5ff; --bg: #08080f; --s1: #12121f; --border: rgba(255,255,255,0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100%; }
header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
#messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
.msg { max-width: 88%; padding: 14px; border-radius: 18px; font-size: 16px; }
.user { align-self: flex-end; background: linear-gradient(135deg, var(--c1), var(--c2)); }
.ai { align-self: flex-start; background: var(--s1); border: 1px solid var(--border); }
#input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
#txt { flex: 1; background: var(--s1); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 14px; resize: none; }
.btn { width: 50px; height: 50px; border-radius: 14px; border: none; background: var(--s1); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.btn.on { background: #ff2faa; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
#settings-sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: flex-end; z-index: 100; }
#settings-sheet.open { display: flex; }
.sheet-box { background: var(--s1); width: 100%; padding: 25px; border-radius: 20px 20px 0 0; }
</style>
</head>
<body>
<div id="app">
    <header><div>АККОРД</div><button class="btn" onclick="document.getElementById('settings-sheet').classList.add('open')">⚙️</button></header>
    <div id="messages"></div>
    <div id="input-area">
        <button id="mic-btn" class="btn" onclick="toggleMic()">🎙️</button>
        <textarea id="txt" rows="1"></textarea>
        <button class="btn" onclick="send()">↑</button>
    </div>
</div>
<div id="settings-sheet" onclick="if(event.target===this)closeSettings()">
    <div class="sheet-box"><h3>Настройки</h3><button class="btn" style="width:100%;margin-top:20px" onclick="closeSettings()">Закрыть</button></div>
</div>
<script>
let db, history = [], busy = false, listening = false, recognition;
const API_KEY = localStorage.getItem('akkord_key') || '';
const request = indexedDB.open("AkkordDB", 1);
request.onupgradeneeded = e => e.target.result.createObjectStore("chat", {keyPath: "id"});
request.onsuccess = e => { db = e.target.result; loadHistory(); };
function loadHistory() {
    db.transaction("chat", "readonly").objectStore("chat").getAll().onsuccess = e => {
        history = e.target.result.sort((a,b) => a.id - b.id);
        history.forEach(m => addMsg(m.role, m.content));
    };
}

function toggleMic() {
    if (listening) { recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return alert("Микрофон не поддерживается");
    recognition = new SR();
    recognition.lang = 'ru-RU';
    recognition.interimResults = false; 
    recognition.onstart = () => { listening = true; document.getElementById('mic-btn').classList.add('on'); };
    recognition.onend = () => { listening = false; document.getElementById('mic-btn').classList.remove('on'); };
    recognition.onresult = (e) => {
        document.getElementById('txt').value = e.results[0][0].transcript;
        send();
    };
    recognition.start();
}
async function fetchWithRetry(url, options, retries = 3) {
    for(let i = 0; i < retries; i++) {
        try {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) { if (i === retries - 1) throw e; await new Promise(r => setTimeout(r, 1000)); }
    }
}
async function send() {
    const inp = document.getElementById('txt');
    const text = inp.value.trim();
    if (!text || busy) return;
    inp.value = '';
    addMsg('user', text);
    const msg = {id: Date.now(), role: 'user', content: text};
    history.push(msg);
    db.transaction("chat", "readwrite").objectStore("chat").add(msg);
    busy = true;
    try {
        const data = await fetchWithRetry('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + API_KEY},
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [{role: "system", content: "Ты Аккорд."}, ...history.slice(-10)]
            })
        });
        const reply = data.choices[0].message.content;
        addMsg('ai', reply);
        const aiMsg = {id: Date.now(), role: 'assistant', content: reply};
        history.push(aiMsg);
        db.transaction("chat", "readwrite").objectStore("chat").add(aiMsg);
    } catch(e) { addMsg('ai', 'Ошибка сети.'); }
    busy = false;
}
function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    const msgs = document.getElementById('messages');
    msgs.appendChild(div);
    msgs.scrollTop = 9999;
}
function closeSettings() { document.getElementById('settings-sheet').classList.remove('open'); }
</script>
</body>
</html>
