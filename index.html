<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Аккорд">
<link rel="manifest" href="manifest.json">
<title>Аккорд</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #7b2fff; --c2: #00e5ff; --c3: #2fff7b;
  --bg: #08080f; --s1: #12121f; --s2: #1c1c30;
  --border: rgba(255,255,255,0.08);
  --text: #ffffff; --muted: #9090b0; --speed: 6s;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; touch-action: manipulation; }
.blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; transition: background 3s ease; }
.b1 { width: 300px; height: 300px; opacity: 0.13; top: -80px; right: -60px; background: radial-gradient(circle, var(--c1), transparent); animation: f1 var(--speed) ease-in-out infinite alternate; }
.b2 { width: 250px; height: 250px; opacity: 0.10; bottom: 100px; left: -60px; background: radial-gradient(circle, var(--c2), transparent); animation: f2 calc(var(--speed)*1.3) ease-in-out infinite alternate; }
.b3 { width: 180px; height: 180px; opacity: 0.08; top: 45%; left: 35%; background: radial-gradient(circle, var(--c3), transparent); animation: f3 calc(var(--speed)*0.8) ease-in-out infinite alternate; }
@keyframes f1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,40px) scale(1.1)} }
@keyframes f2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(40px,-30px) scale(1.15)} }
@keyframes f3 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-40px,30px) scale(1.2)} }
#mood-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); z-index: 50; transition: all 3s ease; }
#app { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 1; }
header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); background: rgba(8,8,15,0.85); backdrop-filter: blur(20px); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--c1), var(--c2)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; animation: ap 3s ease-in-out infinite; }
@keyframes ap { 0%,100%{box-shadow:0 0 15px rgba(123,47,255,0.3)} 50%{box-shadow:0 0 30px rgba(0,229,255,0.5)} }
.hinfo { flex: 1; min-width: 0; }
.hinfo h1 { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 900; color: #fff; }
#mood-label { font-size: 11px; color: var(--muted); margin-top: 2px; transition: color 2s ease; }
.hbtn { min-width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; padding: 0 10px; }
.hbtn:active { background: rgba(255,255,255,0.14); color: #fff; }
.hbtn.accent { color: var(--c2); border-color: rgba(0,229,255,0.3); }
#messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 14px 8px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
#messages::-webkit-scrollbar { display: none; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; text-align: center; padding: 20px; }
.w-orb { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--c1), var(--c2), var(--c3), var(--c1)); display: flex; align-items: center; justify-content: center; font-size: 46px; animation: orb-s 8s linear infinite, orb-f 3s ease-in-out infinite; position: relative; }
.w-orb::before { content:''; position:absolute; inset:-10px; border-radius:50%; background:conic-gradient(transparent 60%, var(--c2), transparent); animation:rs 3s linear infinite; opacity:0.5; }
@keyframes orb-s { to { filter: hue-rotate(360deg); } }
@keyframes orb-f { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes rs { to { transform: rotate(360deg); } }
.w-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 900; }
.w-title span { background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.w-sub { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 280px; }
.chips { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
.chip { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 15px 16px; font-size: 15px; color: var(--muted); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; text-align: left; font-family: 'Inter', sans-serif; font-weight: 500; min-height: 54px; }
.chip:active { background: var(--s2); color: #fff; border-color: var(--c2); }
.msg { display: flex; flex-direction: column; gap: 4px; max-width: 88%; animation: fu 0.25s ease; }
@keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai { align-self: flex-start; align-items: flex-start; }
.msg-who { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 5px; font-weight: 600; }
.bubble { padding: 14px 18px; border-radius: 18px; font-size: 16px; line-height: 1.65; word-break: break-word; font-weight: 400; }
.msg.user .bubble { background: linear-gradient(135deg, rgba(123,47,255,0.55), rgba(0,229,255,0.3)); border: 1px solid rgba(123,47,255,0.4); border-bottom-right-radius: 5px; color: #fff; }
.msg.ai .bubble { background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.13); border-bottom-left-radius: 5px; color: #fff; }
.typing-wrap { display: flex; gap: 6px; padding: 16px 18px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; border-bottom-left-radius: 5px; align-items: center; }
.typing-wrap span { width: 8px; height: 8px; border-radius: 50%; opacity: 0.4; animation: bl 1.4s ease-in-out infinite; }
.typing-wrap span:nth-child(1) { background: var(--c1); }
.typing-wrap span:nth-child(2) { background: var(--c2); animation-delay: 0.2s; }
.typing-wrap span:nth-child(3) { background: var(--c3); animation-delay: 0.4s; }
@keyframes bl { 0%,80%,100%{opacity:0.3;transform:scale(1)} 40%{opacity:1;transform:scale(1.5)} }
#input-area { padding: 10px 14px 18px; background: rgba(8,8,15,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; }
#voice-bar { display: none; margin-bottom: 8px; background: rgba(255,47,170,0.08); border: 1px solid rgba(255,47,170,0.3); border-radius: 12px; padding: 10px 14px; font-size: 14px; color: #ff8ccc; font-weight: 500; animation: vp 1s ease-in-out infinite; }
@keyframes vp { 0%,100%{border-color:rgba(255,47,170,0.2)} 50%{border-color:rgba(255,47,170,0.6)} }
#voice-bar.on { display: block; }
.input-row { display: flex; align-items: flex-end; gap: 10px; }
#txt { flex: 1; background: var(--s1); border: 1px solid var(--border); border-radius: 16px; padding: 15px 16px; color: #fff; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; resize: none; outline: none; max-height: 130px; min-height: 54px; transition: border-color 0.2s; -webkit-appearance: none; line-height: 1.5; }
#txt:focus { border-color: rgba(123,47,255,0.5); background: var(--s2); }
#txt::placeholder { color: var(--muted); }
.btn { width: 54px; height: 54px; border-radius: 16px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; transition: all 0.15s; }
#mic { background: var(--s1); border: 1px solid var(--border); color: var(--muted); }
#mic.on { background: linear-gradient(135deg, #ff2faa, #ff5050); border: none; color: white; animation: mp 0.8s ease-in-out infinite; }
@keyframes mp { 0%,100%{box-shadow:0 0 20px rgba(255,47,170,0.4);transform:scale(1)} 50%{box-shadow:0 0 40px rgba(255,47,170,0.7);transform:scale(1.06)} }
#send { background: linear-gradient(135deg, var(--c1), var(--c2)); color: white; box-shadow: 0 4px 20px rgba(123,47,255,0.35); transition: background 3s ease; }
#send:active { transform: scale(0.88); }
#send:disabled { opacity: 0.2; box-shadow: none; }
#status { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; min-height: 16px; font-weight: 500; }
.overlay { position: fixed; inset: 0; z-index: 100; background: rgba(4,4,12,0.97); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: var(--s1); border: 1px solid var(--border); border-radius: 24px; padding: 30px 22px; max-width: 360px; width: 100%; }
.card-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
.card h2 { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 10px; background: linear-gradient(90deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
.card input { width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; margin-bottom: 14px; -webkit-appearance: none; }
.card input:focus { border-color: rgba(0,229,255,0.4); }
.card-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--c1), var(--c2)); border: none; border-radius: 14px; color: white; font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
.card-btn:active { opacity: 0.8; }
.card-note { margin-top: 14px; font-size: 12px; color: var(--muted); text-align: center; }
.card-note a { color: var(--c2); text-decoration: none; }
#model-sheet { position: fixed; inset: 0; z-index: 100; background: rgba(4,4,12,0.96); backdrop-filter: blur(20px); display: none; align-items: flex-end; justify-content: center; }
#model-sheet.open { display: flex; }
.sheet-box { background: var(--s1); border: 1px solid var(--border); border-radius: 22px 22px 0 0; padding: 22px 18px 36px; width: 100%; animation: su 0.3s ease; }
@keyframes su { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-box h3 { font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; margin-bottom:16px; color:var(--muted); letter-spacing:0.12em; }
.m-opt { padding: 16px; border-radius: 14px; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; min-height: 62px; }
.m-opt:active { background: var(--s2); }
.m-opt.sel { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.25); }
.m-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.3s; }
.m-opt.sel .m-dot { background: var(--c2); box-shadow: 0 0 10px var(--c2); }
.m-name { font-size: 15px; color: #fff; font-weight: 600; }
.m-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }
</style>
</head>
