<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACCORD // NEURAL CORE</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --cyan: #00e5ff;
  --bg: #050508;
  --panel: rgba(0, 229, 255, 0.03);
  --glow: 0 0 20px rgba(0, 229, 255, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--cyan); 
  font-family: 'Share Tech Mono', monospace; 
  height: 100vh; 
  display: flex; flex-direction: column;
  overflow: hidden;
  text-transform: uppercase;
}

/* Background Grid */
body::before {
  content: ""; position: fixed; inset: 0;
  background: linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
              linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}

header {
  padding: 20px; border-bottom: 1px solid rgba(0,229,255,0.1);
  display: flex; justify-content: space-between; align-items: center;
  backdrop-filter: blur(10px); z-index: 10;
}

#messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 15px;
  mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
}

.msg { max-width: 80%; padding: 10px; border-left: 2px solid var(--cyan); background: var(--panel); font-size: 14px; }
.msg.user { align-self: flex-end; border-left: 0; border-right: 2px solid #fff; color: #fff; }

/* ЦЕНТРАЛЬНЫЙ ОВАЛ (JARVIS CORE) */
.core-wrapper {
  height: 250px; display: flex; align-items: center; justify-content: center;
  position: relative;
}

.visualizer-container {
  width: 120px; height: 120px;
  position: relative; display: flex; align-items: center; justify-content: center;
}

#core-circle {
  width: 100%; height: 100%;
  background: var(--cyan);
  border-radius: 50%;
  filter: blur(2px);
  box-shadow: var(--glow);
  transition: transform 0.1s ease, border-radius 0.2s ease;
  cursor: pointer;
}

.ring {
  position: absolute; border: 1px solid var(--cyan); border-radius: 50%;
  opacity: 0.3; pointer-events: none;
}
.r1 { width: 140px; height: 140px; animation: spin 4s linear infinite; }
.r2 { width: 170px; height: 170px; animation: spin 6s linear infinite reverse; border-style: dashed; }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Ввод */
.input-box {
  padding: 20px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(0,229,255,0.1);
  display: flex; gap: 10px; align-items: center;
}

#txt {
  flex: 1; background: transparent; border: none; color: var(--cyan);
  font-family: inherit; font-size: 16px; outline: none; resize: none;
}

.btn {
  background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
  padding: 10px 20px; cursor: pointer; font-family: inherit;
}

/* Модалка */
.overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
.card { border: 1px solid var(--cyan); padding: 40px; text-align: center; background: var(--panel); box-shadow: var(--glow); }
.card input { background: transparent; border: 1px solid var(--cyan); color: #fff; padding: 10px; margin: 20px 0; width: 100%; outline: none; }
</style>
</head>
<body>

<div class="overlay" id="key-modal">
  <div class="card">
    <h1>ACCORD SYSTEM</h1>
    <input type="password" id="key-input" placeholder="ACCESS_KEY [GROQ]">
    <button class="btn" onclick="saveKey()">LOGIN</button>
  </div>
</div>

<header>
  <div>
    <h2 style="font-family:'Unbounded'; font-size:14px;">ACCORD // CORE</h2>
    <div id="status" style="font-size:9px; opacity:0.6;">SYSTEM_IDLE</div>
  </div>
  <button class="btn" onclick="forgetKey()" style="font-size:10px;">RESET</button>
</header>

<div id="messages"></div>

<div class="core-wrapper">
  <div class="visualizer-container">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div id="core-circle" onclick="toggleMic()"></div>
  </div>
</div>

<div class="input-box">
  <textarea id="txt" placeholder="COMMAND_INPUT..." rows="1"></textarea>
  <button class="btn" onclick="send()">EXEC</button>
</div>

<script>
let apiKey = localStorage.getItem('akkord_key_pro') || '';
let history = JSON.parse(localStorage.getItem('akkord_history')) || [];
let busy = false;
const core = document.getElementById('core-circle');

if (apiKey) document.getElementById('key-modal').style.display = 'none';

window.onload = () => {
  history.forEach(msg => renderMsg(msg.role, msg.content));
};

function saveKey() {
  const val = document.getElementById('key-input').value.trim();
  if (val.startsWith('gsk_')) {
    apiKey = val;
    localStorage.setItem('akkord_key_pro', val);
    document.getElementById('key-modal').style.display = 'none';
  }
}

function forgetKey() {
  if (confirm('ERASE MEMORY?')) { localStorage.clear(); location.reload(); }
}

// --- ВИЗУАЛИЗАЦИЯ ГОЛОСА ---
let audioCtx, analyser, dataArray, source;

async function startVisualizer(stream) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  draw();
}

function draw() {
  if (!busy && !recognitionActive) {
    core.style.transform = 'scale(1)';
    core.style.borderRadius = '50%';
    return;
  }
  requestAnimationFrame(draw);
  analyser.getByteFrequencyData(dataArray);
  
  let sum = 0;
  for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
  let volume = sum / dataArray.length;
  
  // Трансформация овала
  let scale = 1 + (volume / 128);
  let deform = 50 - (volume / 10);
  core.style.transform = `scale(${scale})`;
  core.style.borderRadius = `${deform}% ${100-deform}% ${deform}% ${100-deform}%`;
}

// --- ГОЛОСОВОЙ ВВОД ---
let recognitionActive = false;
function toggleMic() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return;
  const rec = new Speech();
  rec.lang = 'ru-RU';
  
  rec.onstart = async () => {
    recognitionActive = true;
    document.getElementById('status').textContent = 'LISTENING...';
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    startVisualizer(stream);
  };
  
  rec.onresult = (e) => {
    document.getElementById('txt').value = e.results[0][0].transcript;
  };
  
  rec.onend = () => {
    recognitionActive = false;
    document.getElementById('status').textContent = 'SYSTEM_READY';
    if (document.getElementById('txt').value) send();
  };
  rec.start();
}

// --- ОТПРАВКА ---
async function send() {
  const inp = document.getElementById('txt');
  const text = inp.value.trim();
  if (!text || busy) return;

  inp.value = '';
  addMsg('user', text);
  busy = true;
  document.getElementById('status').textContent = 'THINKING...';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [{role:'system', content:'Ты - ACCORD, ИИ-система. Ответы краткие.'}, ...history]
      })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMsg('ai', reply);
    speak(reply);
  } catch (e) {
    document.getElementById('status').textContent = 'CONNECT_ERROR';
  } finally {
    busy = false;
  }
}

function addMsg(role, content) {
  history.push({role, content});
  if (history.length > 10) history.shift();
  localStorage.setItem('akkord_history', JSON.stringify(history));
  renderMsg(role, content);
}

function renderMsg(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = role === 'ai' ? marked.parse(content) : content;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

// --- ОЗВУЧКА ---
function speak(text) {
  window.speechSynthesis.cancel();
  const ut = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, '').substring(0, 300));
  ut.lang = 'ru-RU';
  
  // Визуализация при говорении ИИ (фиктивная пульсация)
  let speakInterval = setInterval(() => {
    if (!window.speechSynthesis.speaking) {
      clearInterval(speakInterval);
      core.style.transform = 'scale(1)';
      return;
    }
    let v = Math.random() * 50 + 20;
    core.style.transform = `scale(${1 + v/100})`;
    core.style.borderRadius = `${50-v/5}% ${50+v/5}%`;
  }, 100);

  window.speechSynthesis.speak(ut);
}
</script>
</body>
</html>
